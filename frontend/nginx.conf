server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location __BASE_PATH__/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static public/ files (logos, favicons, etc.) — alias so sub-path deploys
    # don't fall through to index.html and serve HTML as a PNG.
    location __BASE_PATH__/logos/ {
        alias /usr/share/nginx/html/logos/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location __BASE_PATH_ROOT__ {
        try_files $uri /index.html;
    }

    location = __BASE_PATH__/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /health {
        access_log off;
        return 200 'ok';
    }
}
