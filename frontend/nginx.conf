server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached — it points to hashed bundle filenames
    # that change every deploy. If the browser serves a stale index.html, it
    # references bundle hashes that no longer exist on the server.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Cache hashed static assets aggressively (filename includes content hash).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't log health checks
    location = /health {
        access_log off;
        return 200 'ok';
    }
}
