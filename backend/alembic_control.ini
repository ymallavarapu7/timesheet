[alembic]
script_location = alembic_control
prepend_sys_path = .
version_path_separator = os

# Placeholder URL — overridden at runtime by alembic_control/env.py
# from app settings (settings.control_database_url).
sqlalchemy.url = postgresql+asyncpg://timesheet_user:timesheet_pass@localhost:5432/acufy_control

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
