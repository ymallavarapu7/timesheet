version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: timesheet_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timesheet_pass}
      POSTGRES_DB: timesheet_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesheet_user -d timesheet_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://timesheet_user:${POSTGRES_PASSWORD:-timesheet_pass}@db:5432/timesheet_db
      REDIS_URL: redis://redis:6379
    ports:
      - "8081:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  # ── Background Worker ─────────────────────────────────────
  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://timesheet_user:${POSTGRES_PASSWORD:-timesheet_pass}@db:5432/timesheet_db
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python run_worker.py

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://54.225.103.202:8081
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
